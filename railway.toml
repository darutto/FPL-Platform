# =============================================================================
# OWNED-STORE R2 SYNC (H5) — configure these in the Railway dashboard.
# Railway reads real values from the dashboard / secrets store, NOT from this
# file. Do NOT put secret values here. Startup sync of the owned parquet store
# from Cloudflare R2 is OFF unless OWNED_STORE_SYNC_ENABLED is truthy.
#   OWNED_STORE_SYNC_ENABLED          truthy ("1"/"true"/"yes") enables sync
#   OWNED_STORE_R2_ENDPOINT           https://<accountid>.r2.cloudflarestorage.com
#   OWNED_STORE_R2_BUCKET             R2 bucket name
#   OWNED_STORE_R2_ACCESS_KEY_ID      R2 access key id
#   OWNED_STORE_R2_SECRET_ACCESS_KEY  R2 secret access key
#   OWNED_STORE_R2_PREFIX             optional key prefix (default "")
# =============================================================================

[build]
dockerfilePath = "packages/fpl-grounded-assistant/Dockerfile"

[deploy]
healthcheckPath = "/ready"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
